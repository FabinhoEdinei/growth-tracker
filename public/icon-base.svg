<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0a1e;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="gGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:0.2" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>

  <circle cx="256" cy="256" r="180" fill="#00ff88" opacity="0.1" filter="blur(50px)"/>

  <text x="256" y="80" font-family="'Courier New', monospace" font-size="36" font-weight="bold" fill="#00ff88" text-anchor="middle" filter="url(#glow)">Growth-tracker</text>

  <g transform="translate(256, 256)" filter="url(#glow)">
    
    <circle cx="0" cy="0" r="130" fill="none" stroke="url(#orbitGrad)" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="100" ry="140" fill="none" stroke="url(#orbitGrad)" stroke-width="1.5" transform="rotate(20)"/>
    <ellipse cx="0" cy="0" rx="100" ry="140" fill="none" stroke="url(#orbitGrad)" stroke-width="1.5" transform="rotate(-20)"/>

    <circle cx="-135" cy="0" r="8" fill="#ff00ff"/>
    <circle cx="135" cy="0" r="8" fill="#ffaa00"/>
    <circle cx="-100" cy="-90" r="7" fill="#00ffff"/>
    <circle cx="100" cy="90" r="7" fill="#00ffff"/>
    <circle cx="-60" cy="-125" r="9" fill="#00ff88"/>
    <circle cx="60" cy="125" r="9" fill="#00ff88"/>
    <circle cx="-20" cy="-135" r="6" fill="#a855f7"/>
    <circle cx="20" cy="135" r="6" fill="#a855f7"/>

    <path d="M -20,-60 Q -60,-60 -60,-20 Q -60,20 -60,60 Q -60,100 -20,100 Q 20,100 60,100 L 60,40 L 20,40 L 20,70 L -20,70 Q -40,70 -40,50 Q -40,30 -40,10 Q -40,-10 -40,-30 Q -40,-50 -20,-50 Q 0,-50 20,-50 L 40,-50 L 40,-80 L 20,-80 Q 0,-80 -20,-80 Z" 
          fill="url(#gGrad)" 
          stroke="white" stroke-width="2" stroke-opacity="0.3"/>
  </g>

</svg>
