<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradientes -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0a1e;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="particleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0" />
    </radialGradient>

    <!-- Filtros -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>

  <!-- Glow central -->
  <circle cx="256" cy="256" r="200" fill="url(#glowGrad)" opacity="0.4"/>

  <!-- Partículas orbitais -->
  <g filter="url(#glow)">
    <!-- Órbita externa -->
    <circle cx="256" cy="120" r="12" fill="#00ff88" opacity="0.9"/>
    <circle cx="392" cy="256" r="10" fill="#00d4ff" opacity="0.8"/>
    <circle cx="256" cy="392" r="14" fill="#a855f7" opacity="0.9"/>
    <circle cx="120" cy="256" r="11" fill="#ff00ff" opacity="0.8"/>

    <!-- Órbita média -->
    <circle cx="340" cy="172" r="8" fill="#00ffcc" opacity="0.7"/>
    <circle cx="340" cy="340" r="9" fill="#00aaff" opacity="0.7"/>
    <circle cx="172" cy="340" r="7" fill="#cc00ff" opacity="0.7"/>
    <circle cx="172" cy="172" r="10" fill="#ffaa00" opacity="0.7"/>

    <!-- Partículas pequenas -->
    <circle cx="300" cy="140" r="4" fill="#00ff88" opacity="0.6"/>
    <circle cx="372" cy="212" r="5" fill="#00d4ff" opacity="0.6"/>
    <circle cx="372" cy="300" r="4" fill="#ff00aa" opacity="0.6"/>
    <circle cx="300" cy="372" r="5" fill="#a855f7" opacity="0.6"/>
    <circle cx="212" cy="372" r="4" fill="#00ffcc" opacity="0.6"/>
    <circle cx="140" cy="300" r="5" fill="#ff0066" opacity="0.6"/>
    <circle cx="140" cy="212" r="4" fill="#ffaa00" opacity="0.6"/>
    <circle cx="212" cy="140" r="5" fill="#00ff88" opacity="0.6"/>
  </g>

  <!-- Símbolo central "G" estilizado -->
  <g transform="translate(256, 256)">
    <!-- Anel externo -->
    <circle cx="0" cy="0" r="85" fill="none" stroke="url(#particleGrad)" stroke-width="6" opacity="0.4"/>
    
    <!-- G estilizado -->
    <path d="M -20,-60 Q -60,-60 -60,-20 Q -60,20 -60,60 Q -60,100 -20,100 Q 20,100 60,100 L 60,40 L 20,40 L 20,70 L -20,70 Q -40,70 -40,50 Q -40,30 -40,10 Q -40,-10 -40,-30 Q -40,-50 -20,-50 Q 0,-50 20,-50 L 40,-50 L 40,-80 L 20,-80 Q 0,-80 -20,-80 Z" 
          fill="url(#particleGrad)" 
          filter="url(#glow)"/>
    
    <!-- Detalhe interno -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#00ff88" stroke-width="3" opacity="0.3" stroke-dasharray="5,5"/>
  </g>

  <!-- Linhas de conexão entre partículas -->
  <g opacity="0.2" stroke="url(#particleGrad)" stroke-width="1.5">
    <line x1="256" y1="120" x2="340" y2="172"/>
    <line x1="392" y1="256" x2="340" y2="340"/>
    <line x1="256" y1="392" x2="172" y2="340"/>
    <line x1="120" y1="256" x2="172" y2="172"/>
    <line x1="340" y1="172" x2="392" y2="256"/>
    <line x1="340" y1="340" x2="256" y2="392"/>
    <line x1="172" y1="340" x2="120" y2="256"/>
    <line x1="172" y1="172" x2="256" y2="120"/>
  </g>

  <!-- Texto "GT" no topo (opcional, pode remover se quiser só ícone) -->
  <text x="256" y="80" font-family="'Courier New', monospace" font-size="36" font-weight="bold" fill="#00ff88" text-anchor="middle" opacity="0.7">GT</text>
</svg>